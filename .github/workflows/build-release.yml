name: Android Release Build

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Enable manual trigger
    inputs:
      tag:
        description: 'Tag to release to (e.g. v1.0.5)'
        required: false
        type: string

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode client_secret.json
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: 'client_secret.json'
          encodedString: ${{ secrets.CLIENT_SECRET_BASE64 }}

      - name: Copy client_secret.json to assets
        run: |
          mkdir -p app/src/main/assets
          cp ${{ env.BASE64_TO_FILE }} app/src/main/assets/client_secret.json

      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: 'keystore.jks'
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Inject Keystore Properties
        run: |
          echo "KEYSTORE_FILE=${{ steps.decode_keystore.outputs.filePath }}" >> local.properties
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties
          echo "WEB_CLIENT_ID=${{ secrets.WEB_CLIENT_ID }}" >> local.properties

      - name: Build and Sign Release APK
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create or Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
