name: Build Pre-Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          fi

      - name: Configure local.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REALITY_LICENSE_URL: ${{ secrets.REALITY_LICENSE_URL }}
        run: |
          touch local.properties
          echo "KEYSTORE_FILE=keystore.jks" >> local.properties
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> local.properties
          echo "KEY_ALIAS=$KEY_ALIAS" >> local.properties
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> local.properties
          echo "DEFAULT_CLIENT_ID=$CLIENT_ID" >> local.properties
          echo "DEFAULT_CLIENT_SECRET=$CLIENT_SECRET" >> local.properties
          echo "REALITY_LICENSE_URL=$REALITY_LICENSE_URL" >> local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Extract Version Name
        id: version
        run: |
          VERSION_NAME=$(grep -E 'versionName\s*=\s*".*"' app/build.gradle.kts | sed -E 's/.*versionName\s*=\s*"([^"]+)".*/\1/')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "Extracted version: $VERSION_NAME"

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Create Pre-Release & Upload APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH=$(find app/build_v4/outputs/apk/release -name "*.apk" | head -n 1)
          echo "Found APK at $APK_PATH"
          
          # Check if the release exists and extract whether it is a prerelease
          IS_PRERELEASE=$(gh release view "v$VERSION_NAME" --json isPrerelease --jq .isPrerelease 2>/dev/null || echo "not_found")
          
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "Pre-release v$VERSION_NAME already exists. Adding new unique APK asset..."
            gh release upload "v$VERSION_NAME" "$APK_PATH"
          elif [ "$IS_PRERELEASE" = "false" ]; then
            echo "ERROR: v$VERSION_NAME exists but it is a STABLE release!"
            echo "To protect your normal users, we will not upload this early access build here."
            echo "Please bump your versionName in build.gradle.kts to create a new pre-release."
            exit 1
          else
            echo "Release v$VERSION_NAME does not exist. Creating a brand new Pre-Release..."
            gh release create "v$VERSION_NAME" "$APK_PATH" \
              --title "Pre-Release v$VERSION_NAME" \
              --notes "Automated background build via GitHub Actions." \
              --prerelease
          fi
