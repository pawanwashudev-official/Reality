name: Build Pre-Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          fi

      - name: Configure local.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          AI_URL: ${{ secrets.AI_URL }}
        run: |
          touch local.properties
          echo "KEYSTORE_FILE=keystore.jks" >> local.properties
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> local.properties
          echo "KEY_ALIAS=$KEY_ALIAS" >> local.properties
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> local.properties
          echo "WORKER_URL=$WORKER_URL" >> local.properties
          echo "AI_URL=$AI_URL" >> local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Extract Version Name
        id: version
        run: |
          VERSION_NAME=$(grep -E 'versionName\s*=\s*".*"' app/build.gradle.kts | sed -E 's/.*versionName\s*=\s*"([^"]+)".*/\1/')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "Extracted version: $VERSION_NAME"

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Create Pre-Release & Upload APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH=$(find app/build_v4/outputs/apk/release -name "*.apk" | head -n 1)
          echo "Found APK at $APK_PATH"
          
          # Target tag automatically appends -beta to guarantee it stays a Pre-Release page
          TARGET_TAG="v${VERSION_NAME}-beta"
          
          if gh release view "$TARGET_TAG" >/dev/null 2>&1; then
            echo "Pre-release $TARGET_TAG already exists. Adding new unique APK asset..."
            gh release upload "$TARGET_TAG" "$APK_PATH"
          else
            echo "Pre-release $TARGET_TAG does not exist. Creating a brand new Pre-Release page..."
            gh release create "$TARGET_TAG" "$APK_PATH" \
              --title "Pre-Release $TARGET_TAG" \
              --notes "Automated early access build via GitHub Actions." \
              --prerelease
          fi
