name: Build and Deploy to Firebase

on:
  workflow_dispatch: # Keeping your manual trigger!

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          fi

      - name: Configure local.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REALITY_LICENSE_URL: ${{ secrets.REALITY_LICENSE_URL }}
        run: |
          touch local.properties
          echo "KEYSTORE_FILE=keystore.jks" >> local.properties
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> local.properties
          echo "KEY_ALIAS=$KEY_ALIAS" >> local.properties
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> local.properties
          echo "DEFAULT_CLIENT_ID=$CLIENT_ID" >> local.properties
          echo "DEFAULT_CLIENT_SECRET=$CLIENT_SECRET" >> local.properties
          echo "REALITY_LICENSE_URL=$REALITY_LICENSE_URL" >> local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Extract Version Name
        id: version
        run: |
          VERSION_NAME=$(grep -E 'versionName\s*=\s*".*"' app/build.gradle.kts | sed -E 's/.*versionName\s*=\s*"([^"]+)".*/\1/')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "Extracted version: $VERSION_NAME"

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Find APK Path
        id: find_apk
        run: |
          # Using your specific build_v4 path
          APK_PATH=$(find app/build_v4/outputs/apk/release -name "*.apk" | head -n 1)
          echo "Found APK at $APK_PATH"
          # Save the path to an output variable so the Firebase step can use it
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          file: ${{ steps.find_apk.outputs.apk_path }}
          releaseNotes: "Automated early access release v${{ env.VERSION_NAME }} for Pro members."
